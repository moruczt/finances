name: Deploy Finances App

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build Tailwind CSS
        run: |
          npm install tailwindcss @tailwindcss/cli
          npx @tailwindcss/cli -i ./static/css/input.css -o ./static/css/main.css --minify

      - name: Copy CSS to VPS
        uses: appleboy/scp-action@a6e43c3aaf4e8e6b0b15bf34e19d71118f6b1ca7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{secrets.SSH_PORT }}
          source: "static/css/main.css"
          target: "/home/moruczt/finances/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{secrets.SSH_PORT }}
          script: |
            cd /home/moruczt/finances
            
            git pull origin main

            source venv/bin/activate

            pip install -r requirements.txt

            alembic upgrade head

            sudo systemctl restart finances