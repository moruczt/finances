<!DOCTYPE html>
<html lang="en" dir="ltr" class="h-full bg-slate-50/50">
<head>
    <title>Finances{% block title %} | Dashboard{% endblock %}</title>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="referrer" content="same-origin">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#3b82f6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', path='/img/favicon-32x32.png').path }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='/img/apple-touch-icon.png').path }}">

    <script defer src="{{ url_for('static', path='/js/finances.js').path }}"></script>
    {% block scripts %}
    {% endblock %}
    <link type="text/css" rel="stylesheet" href="{{ url_for('static', path='/css/main.css').path }}">
    {% block styles %}
    {% endblock %}
</head>
<body class="flex flex-col min-h-screen pb-20 md:pb-0">
    <div class="hidden border-blue-500! bg-blue-50! text-gray-700 rotate-90 bg-blue-50/60 border-l-blue-500 hover:bg-blue-50/30 cursor-pointer transition-colors group
                p-2 font-semibold text-gray-500 border-r border-gray-100 text-gray-900 font-medium group-hover:text-blue-600 transition-colors flex items-center justify-between
                text-[9px] bg-gray-100 text-gray-400 group-hover:bg-blue-100 group-hover:text-blue-700 font-bold px-1 rounded uppercase tracking-wider scale-90 opacity-0 group-hover:opacity-100 transition-all
                p-3 text-center border border-dashed border-gray-200 rounded-xl text-xs italic text-gray-400 items-center gap-2 bg-slate-50 border border-gray-200 p-2 rounded-xl animate-fade-in
                text-[10px] font-bold font-mono text-gray-400 bg-white border border-gray-200 px-2 py-1 rounded-lg truncate max-w-30 text-xs text-gray-400 font-mono font-bold
                grow px-2 py-1 font-mono text-xs bg-white border border-gray-200 rounded-lg outline-none focus:border-blue-500 text-blue-600 font-semibold
                text-gray-400 hover:text-red-500 p-1 rounded-lg transition-colors cursor-pointer w-4 h-4"></div>


    {% if user %}
        <header class="hidden md:block w-full bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm/50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
                
                <div class="flex items-center gap-6">
                    <a href="/" class="text-sm font-black tracking-tight text-blue-600 uppercase flex items-center gap-1.5">
                        <span class="w-2 h-5 bg-blue-600 rounded-sm"></span>Finances
                    </a>
                    <nav class="flex items-center gap-1 text-xs font-semibold text-gray-600">
                        <a href="/" class="px-3 py-1.5 rounded-lg hover:bg-slate-50 transition-colors {% if request.url.path == '/' %}bg-blue-50 text-blue-600{% endif %}">Dashboard</a>
                        <a href="/transactions" class="px-3 py-1.5 rounded-lg hover:bg-slate-50 transition-colors {% if '/transactions' in request.url.path %}bg-blue-50 text-blue-600{% endif %}">Transactions</a>
                        <a href="/categorize" class="px-3 py-1.5 rounded-lg hover:bg-slate-50 transition-colors {% if '/categorize' in request.url.path %}bg-blue-50 text-blue-600{% endif %}">Categorize</a>
                        <a href="/import" class="px-3 py-1.5 rounded-lg hover:bg-slate-50 transition-colors {% if request.url.path == '/import' %}bg-blue-50 text-blue-600{% endif %}">Import File</a>
                        <a href="/imports" class="px-3 py-1.5 rounded-lg hover:bg-slate-50 transition-colors {% if request.url.path == '/imports' %}bg-blue-50 text-blue-600{% endif %}">Logs</a>
                        <a href="/manual" class="px-3 py-1.5 rounded-lg hover:bg-slate-50 transition-colors {% if '/manual' in request.url.path %}bg-blue-50 text-blue-600{% endif %}">Manual Entry</a>
                    </nav>
                </div>

                <div class="flex items-center gap-4">
                    <form action="{{ url_for('logout') }}" method="post" class="m-0">
                        <button type="submit" class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-semibold text-gray-500 hover:text-red-600 rounded-lg hover:bg-red-50 transition-colors border border-transparent hover:border-red-100">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </header>

        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40 pb-safe shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
            <div class="grid grid-cols-6 h-16 text-[10px] font-bold tracking-tight text-gray-500">
                
                <a href="/" class="flex flex-col items-center justify-center gap-1 transition-colors {% if request.url.path == '/' %}text-blue-600{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" /></svg>
                    <span>Home</span>
                </a>

                <a href="/transactions" class="flex flex-col items-center justify-center gap-1 transition-colors {% if '/transactions' in request.url.path %}text-blue-600{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                    <span>Ledger</span>
                </a>

                <a href="/categorize" class="flex flex-col items-center justify-center gap-1 transition-colors {% if '/categorize' in request.url.path %}text-blue-600{% endif %}">
                    <div class="relative">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>
                    </div>
                    <span>Classify</span>
                </a>

                <a href="/import" class="flex flex-col items-center justify-center gap-1 transition-colors {% if request.url.path == '/import' or request.url.path == '/imports' %}text-blue-600{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    <span>Import</span>
                </a>

                <a href="/manual" class="flex flex-col items-center justify-center gap-1 transition-colors {% if '/manual' in request.url.path %}text-blue-600{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    <span>Add</span>
                </a>

                <form action="{{ url_for('logout') }}" method="post" class="m-0 p-0 flex">
                    <button type="submit" class="w-full h-full flex flex-col items-center justify-center gap-1 text-[10px] font-bold text-gray-400 active:text-red-600 cursor-pointer">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        <span>Exit</span>
                    </button>
                </form>

            </div>
        </nav>
    {% endif %}
    <main class="grow">
        {% block content %}
        {% endblock %}
    </main>
    <div id="toast-container" class="fixed bottom-20 md:bottom-5 right-5 z-50 flex flex-col gap-3">
    </div>
</body>
</html>
