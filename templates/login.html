{% extends "base.html" %}

{% block title %} - Login{% endblock %}

{% block scripts %}
{% endblock %}

{% block content %}
    <div class="min-h-screen flex flex-col items-center justify-center sm:p-6 bg-gray-50">
        <div class="w-full max-w-md bg-white sm:rounded-2xl shadow-xl border-y sm:border border-gray-100 p-6 md:p-8">
            
            <header class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-800">Sign In</h2>
                <p class="text-sm text-gray-500 mt-1">Access your personal finance dashboard</p>
            </header>

            <form id="loginForm" class="space-y-6" method="POST">
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none" />
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required placeholder="********"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none" />
                </div>
                <div class="pt-2">
                    <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-200 transition-all transform active:scale-[0.98]">
                        Log In
                    </button>
                </div>
            </form>

            <div id="error" class="hidden mt-6 p-3 bg-red-50 border border-red-100 rounded-lg animate-fade-in">
                <p class="text-sm font-medium text-red-600 text-center">Invalid username or password</p>
            </div>
        </div>
    </div>
{% endblock %}
