{% extends "base.html" %}

{% block title %} - Import{% endblock %}

{% block scripts %}
    <script defer src="{{ url_for('static', path='/js/import.js').path }}"></script>
{% endblock %}

{% block content %}
    <div class="min-h-[calc(100vh-64px)] md:min-h-[calc(100vh-57px)] flex flex-col items-center justify-center p-4 sm:p-6 bg-gray-50/50">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-6 md:p-8 relative">
            <div class="absolute top-6 right-6 md:top-8 md:right-8">
                <a href="/imports" class="inline-flex items-center justify-center p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-50 rounded-xl border border-transparent hover:border-gray-100 transition-all title='View Import History'">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                    </svg>
                </a>
            </div>
            
            <header class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-800">Import Transactions</h2>
                <p class="text-sm text-gray-500 mt-1">Select an account and upload your bank statement</p>
            </header>

            <form id="uploadForm" class="space-y-6">
                <div>
                    <label for="accountSelect" class="block text-sm font-semibold text-gray-700 mb-2">Target Account</label>
                    <select id="accountSelect" class="w-full px-4 py-3 rounded-xl border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none">
                        {% for account_id, account_name in accounts.items() %}
                            <option value="{{ account_id }}">{{ account_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="relative group">
                    <label id="dropZone" for="fileInput" class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-300 rounded-2xl bg-gray-50 cursor-pointer group-hover:bg-blue-50 group-hover:border-blue-300 transition-all">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-10 h-10 mb-3 text-gray-400 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            <p class="text-sm text-gray-600 font-medium">Click to upload .csv or .xlsx</p>
                            <p class="text-xs text-gray-400 mt-1">File will process automatically</p>
                        </div>
                        <input type="file" id="fileInput" class="hidden" accept=".csv, .xlsx" />
                    </label>
                </div>
            </form>

            <div id="spinner" class="hidden flex flex-col items-center justify-center mt-6 animate-fade-in">
                <div class="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                <p class="text-sm font-medium text-blue-600 mt-3">Analyzing statement...</p>
            </div>
        </div>

        <div id="importLog-container" class="w-full max-w-md mt-6 px-4 sm:px-0 opacity-80 hover:opacity-100 transition-opacity duration-300">
            <div class="flex items-center gap-3 mb-4">
                <div class="h-px grow bg-linear-to-r from-transparent to-gray-200"></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400 select-none">Import Log</span>
                <div class="h-px grow bg-linear-to-l from-transparent to-gray-200"></div>
            </div>
            
            <div id="importLog" class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 text-sm text-gray-600 transition-all">
                <div class="text-center py-3 text-xs text-gray-400 font-medium italic">
                    No recent import activity recorded...
                </div>
            </div>
        </div>
    </div>
{% endblock %}
