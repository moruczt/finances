<div class="flex flex-col gap-3 animate-fade-in">
    <div class="flex items-center justify-between pb-2 border-b border-gray-100">
        <div class="flex items-center gap-2">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </span>
            <span class="text-xs font-semibold text-gray-700">Import Successful</span>
        </div>
        <span class="text-[10px] font-mono text-gray-400 bg-gray-50 px-2 py-0.5 rounded border border-gray-100">
            {{ now().strftime('%H:%M:%S') }}
        </span>
    </div>

    <div class="grid grid-cols-2 gap-2 text-xs">
        <div class="bg-gray-50 rounded-lg p-2.5 border border-gray-100/60">
            <span class="block text-[10px] font-medium uppercase tracking-wider text-gray-400 mb-0.5">Parsed Records</span>
            <span class="font-mono font-bold text-gray-700 text-sm">{{ imported['row_count'] }}</span>
            <span class="text-[10px] text-gray-400 block mt-0.5">Total in CSV/Excel file</span>
        </div>

        <div class="bg-emerald-50/40 rounded-lg p-2.5 border border-emerald-100/50">
            <span class="block text-[10px] font-medium uppercase tracking-wider text-emerald-600/80 mb-0.5">Written rows</span>
            <span class="font-mono font-bold text-emerald-700 text-sm">+{{ imported['imported_count'] }}</span>
            <span class="text-[10px] text-emerald-600/60 block mt-0.5">New rows found</span>
        </div>
    </div>

    <div class="flex items-center justify-between text-[11px] bg-slate-50 text-slate-500 rounded-lg px-3 py-2 border border-slate-100">
        <div class="flex items-center gap-1.5">
            <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="font-medium">Data Bookends</span>
        </div>
        <span class="font-mono font-semibold text-slate-600">
            {{ imported['min_date'] }} <span class="text-slate-300 font-normal mx-0.5">→</span> {{ imported['max_date'] }}
        </span>
    </div>
</div>
