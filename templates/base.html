<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <title>Finances{% block title %} | Dashboard{% endblock %}</title>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="referrer" content="same-origin">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#3b82f6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', path='/img/favicon-32x32.png').path }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='/img/apple-touch-icon.png').path }}">

    <script defer src="{{ url_for('static', path='/js/finances.js').path }}"></script>
    {% block scripts %}
    {% endblock %}
    <link type="text/css" rel="stylesheet" href="{{ url_for('static', path='/css/main.css').path }}">
    {% block styles %}
    {% endblock %}
</head>
<body>
    <div class="hidden border-blue-500! bg-blue-50! text-gray-700 rotate-90"></div>


    {% if user %}
        <div class="fixed top-4 right-4 z-50">
            <form action="{{ url_for('logout') }}" method="post">
                <button type="submit" 
                        class="flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-gray-600 bg-white/80 backdrop-blur-sm border border-gray-200 rounded-lg hover:bg-red-50 hover:text-red-600 hover:border-red-100 transition-all shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Logout
                </button>
            </form>
        </div>
    {% endif %}
    {% block content %}
    {% endblock %}
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3">
    </div>
</body>
</html>
